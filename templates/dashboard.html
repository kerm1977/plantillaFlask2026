<!-- Vista: dashboard.html -->
{% extends "base.html" %}

{% block content %}
<style>
    .glass-table-container {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .info-item {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 12px;
        padding: 12px 16px;
    }
    /* Estilizar la tabla para que no tenga fondos sólidos oscuros */
    .table-glass th {
        background: rgba(255, 140, 0, 0.15) !important;
        color: #333 !important;
        border-bottom: 2px solid rgba(255, 140, 0, 0.3) !important;
    }
    .table-glass td {
        background: transparent !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.5) !important;
    }
    .table-hover tbody tr:hover td {
        background: rgba(255, 255, 255, 0.5) !important;
    }
    
    /* Mejoras de responsividad para pantallas pequeñas (538px o menos) */
    @media (max-width: 538px) {
        .glass-panel {
            padding: 1.5rem 1rem !important; /* Reducir padding exterior */
        }
        .glass-table-container {
            padding: 1rem !important;
        }
        h2.fw-bold {
            font-size: 1.4rem; /* Titulo más compacto */
        }
        .table-glass th, .table-glass td {
            font-size: 0.85rem; /* Texto de tabla más pequeño */
            white-space: nowrap; /* Evitar que el texto de la tabla se rompa bruscamente */
        }
        .info-item {
            padding: 10px 12px;
        }
        .info-item .fs-5 {
            font-size: 1.1rem !important;
        }
        .info-item .fs-6 {
            font-size: 0.95rem !important;
        }
        .btn-action-mobile {
            width: 100% !important;
            margin-bottom: 0.5rem !important;
        }
    }
</style>

<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-lg-12 col-xl-10">
        
        <div class="glass-panel rounded-5 p-4 p-md-5 mb-4 position-relative border-0 shadow-lg">
            <h2 class="fw-bold text-dark mb-4 text-center text-md-start">
                <i class="bi bi-speedometer2 text-orange me-2"></i>Dashboard de Administración
            </h2>
            
            <!-- VISTA 1: Lista de Usuarios -->
            <div id="adminUsersList">
                <div class="d-flex flex-column flex-md-row justify-content-between mb-4 gap-3">
                    <div class="input-group shadow-sm rounded-pill overflow-hidden w-100">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-search text-orange"></i></span>
                        <!-- El input busca automáticamente mediante JavaScript (Buscador intocable) -->
                        <input type="text" class="form-control border-0 py-2 bg-white" id="searchUserInput" placeholder="Buscar usuario por nombre o correo...">
                    </div>
                    <!-- Botón Actualizar -->
                    <button class="btn bg-white rounded-pill px-4 flex-shrink-0 shadow-sm fw-bold" style="color: #ff8c00; border: 2px solid #ff8c00;" onclick="loadAllUsers()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Actualizar
                    </button>
                </div>

                <div class="table-responsive glass-table-container rounded-4 p-2 shadow-sm">
                    <table class="table table-hover table-glass align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="border-0 rounded-start fw-bold py-3">Usuario / Contacto</th>
                                <!-- En móviles, Rol y Estado se ocultan como columnas independientes -->
                                <th class="border-0 fw-bold py-3 d-none d-sm-table-cell">Rol</th>
                                <th class="border-0 fw-bold py-3 d-none d-sm-table-cell">Estado</th>
                                <th class="border-0 rounded-end text-end text-sm-center fw-bold py-3">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="4" class="text-center py-4 text-muted"><i class="bi bi-hourglass-split me-2"></i>Cargando registros...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- VISTA 2: Detalle Absoluto del Usuario (Oculto por defecto) -->
            <div id="adminUserDetails" class="d-none animate__animated animate__fadeInRight">
                <!-- Botón Volver -->
                <button class="btn bg-white rounded-pill px-4 shadow-sm mb-4 fw-bold w-100 w-md-auto" style="color: #6c757d; border: 1px solid #ced4da;" onclick="showUsersList()">
                    <i class="bi bi-arrow-left me-1"></i>Volver a la lista
                </button>
                
                <div class="glass-table-container p-3 p-md-5 rounded-4 mb-4" id="userDetailsContent">
                    <!-- El contenido detallado se inyecta por JS -->
                </div>

                <div class="d-flex flex-column flex-md-row gap-2 justify-content-end border-top border-white border-opacity-50 pt-4">
                    <button class="btn btn-warning rounded-pill px-4 shadow-sm fw-bold btn-action-mobile text-dark" id="btnBlockUser" onclick="toggleUserStatus()">
                        <i class="bi bi-slash-circle me-1"></i>Bloquear Acceso
                    </button>
                    <!-- Botón Editar con llamada directa al Modal de Edición -->
                    <button class="btn bg-white rounded-pill px-4 shadow-sm fw-bold btn-action-mobile" style="color: #ff8c00; border: 2px solid #ff8c00;" id="btnEditUserAdmin" onclick="openEditUserModal()">
                        <i class="bi bi-pencil-square me-1"></i>Editar Datos
                    </button>
                    <button class="btn btn-danger rounded-pill px-4 shadow-sm fw-bold btn-action-mobile" id="btnDeleteUser" onclick="confirmDeleteUser()">
                        <i class="bi bi-trash-fill me-1"></i>Borrar Usuario
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal Personalizado Glassmorphic para Alertas y Confirmaciones -->
<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content glass-modal border-0 shadow-lg text-center p-4">
            <div class="modal-body p-0">
                <div id="actionModalIcon" class="mb-3"></div>
                <h5 id="actionModalMessage" class="fw-bold text-dark mb-4 fs-6"></h5>
                <button type="button" class="btn btn-orange rounded-pill px-4 shadow-sm fw-bold w-100" data-bs-dismiss="modal">Aceptar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar Usuario (Desde el Dashboard) -->
<div class="modal fade" id="adminEditUserModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content glass-modal border-0 shadow-lg">
            <div class="modal-header border-0">
                <h4 class="modal-title fw-bold text-dark w-100 text-center">Editar Información del Usuario</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 px-md-5 pb-5 pt-2">
                <form id="adminEditUserForm" enctype="multipart/form-data">
                    
                    <!-- Editor Visual de Avatar -->
                    <div class="text-center mb-4">
                        <div class="avatar-upload-container d-inline-block p-3 glass-panel rounded-4">
                            <div class="position-relative d-inline-block overflow-hidden rounded-circle border border-4 border-white shadow-sm" style="width: 120px; height: 120px;">
                                <img id="editAvatarPreviewImg" src="{{ url_for('static', filename='default.png') }}" class="avatar-preview" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s ease;">
                            </div>
                            
                            <label for="editAvatarUpload" class="btn btn-orange rounded-circle p-2 shadow position-absolute bottom-0 end-0 translate-middle-y me-2" style="cursor: pointer; z-index: 10;">
                                <i class="bi bi-camera-fill text-white"></i>
                            </label>
                            <input type="file" name="avatar" id="editAvatarUpload" class="d-none" accept="image/*">

                            <!-- Controles del Editor Visual -->
                            <div class="image-editor-controls mt-3 text-start">
                                <label class="form-label text-secondary fw-bold mb-1" style="font-size: 0.7rem;"><i class="bi bi-zoom-in me-1"></i>Zoom</label>
                                <input type="range" class="form-range" id="editScaleSlider" min="1" max="3" step="0.1" value="1">
                                
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="form-label text-secondary fw-bold mb-1" style="font-size: 0.7rem;"><i class="bi bi-arrows-move me-1"></i>Horizontal (X)</label>
                                        <input type="range" class="form-range" id="editPosXSlider" min="-50" max="50" step="1" value="0">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label text-secondary fw-bold mb-1" style="font-size: 0.7rem;"><i class="bi bi-arrows-vertical me-1"></i>Vertical (Y)</label>
                                        <input type="range" class="form-range" id="editPosYSlider" min="-50" max="50" step="1" value="0">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Información Personal Básica -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-secondary">Nombre</label>
                            <input type="text" name="name" class="form-control glass-input validate-name" id="editName" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-secondary">1° Apellido</label>
                            <input type="text" name="last_name_1" class="form-control glass-input validate-lastname" id="editLastName1" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-secondary">2° Apellido</label>
                            <input type="text" name="last_name_2" class="form-control glass-input validate-lastname" id="editLastName2" required>
                        </div>
                        <div class="col-md-12 mt-3">
                            <label class="form-label fw-bold text-secondary">Rol de Seguridad</label>
                            <select class="form-select glass-input" name="role" id="editRole" required>
                                <option value="Usuario">Usuario</option>
                                <option value="Colaborador">Colaborador</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Superusuario">Superusuario</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Email Principal</label>
                        <input type="email" name="email" class="form-control glass-input rounded-3 force-lowercase" id="editEmail" required>
                    </div>

                    <!-- Información Adicional Dinámica -->
                    <div class="mb-4 p-4 rounded-4" style="background: rgba(255,140,0,0.08); border: 1px solid rgba(255,140,0,0.15);">
                        <label class="text-orange fw-bold mb-3 d-block"><i class="bi bi-plus-circle-dotted me-2"></i>Información Adicional</label>
                        <select class="form-select glass-input rounded-3 mb-3" id="editDynamicSelect" onchange="handleEditDynamicSelect()">
                            <option value="">Seleccione para agregar...</option>
                            <option value="Telefono">Teléfono</option>
                        </select>
                        <div id="editDynamicContainer" class="animate__animated animate__fadeIn"></div>
                    </div>

                    <!-- Contraseña -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-12 position-relative">
                            <label class="form-label fw-semibold text-secondary">Forzar Nueva Contraseña (Opcional)</label>
                            <input type="password" name="password" class="form-control glass-input rounded-3 pe-5" id="editPass" placeholder="Dejar en blanco para mantener la actual">
                            <i class="bi bi-eye-slash toggle-password position-absolute fs-5" style="right: 15px; top: 36px; cursor: pointer; color: #6c757d;" onclick="togglePasswordVisibility('editPass', this)"></i>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-orange rounded-pill py-3 fw-bold fs-5 shadow-sm">Guardar Cambios del Usuario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Cargar lista automáticamente al entrar a Dashboard usando la base de datos real
    loadAllUsers();

    // Evento de Buscador en tiempo real INTOCABLE
    document.getElementById('searchUserInput').addEventListener('input', function() {
        const filter = this.value.toLowerCase();
        const rows = document.querySelectorAll('#usersTableBody tr.user-row');
        
        rows.forEach(row => {
            const textContent = row.innerText.toLowerCase();
            if (textContent.includes(filter)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });

    // Lógica del Editor de Imagen en Modal de Edición (Dashboard)
    const editAvatarUpload = document.getElementById('editAvatarUpload');
    const editAvatarPreviewImg = document.getElementById('editAvatarPreviewImg');
    const editScaleSlider = document.getElementById('editScaleSlider');
    const editPosXSlider = document.getElementById('editPosXSlider');
    const editPosYSlider = document.getElementById('editPosYSlider');

    if (editScaleSlider && editPosXSlider && editPosYSlider) {
        function updateEditImageTransform() {
            const scale = editScaleSlider.value;
            const posX = editPosXSlider.value;
            const posY = editPosYSlider.value;
            editAvatarPreviewImg.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
        }

        editScaleSlider.addEventListener('input', updateEditImageTransform);
        editPosXSlider.addEventListener('input', updateEditImageTransform);
        editPosYSlider.addEventListener('input', updateEditImageTransform);

        if(editAvatarUpload) {
            editAvatarUpload.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        editAvatarPreviewImg.src = e.target.result;
                        editScaleSlider.value = 1;
                        editPosXSlider.value = 0;
                        editPosYSlider.value = 0;
                        updateEditImageTransform();
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        }
    }

    // MANEJAR GUARDADO DEL FORMULARIO CONECTADO A LA BASE DE DATOS
    document.getElementById('adminEditUserForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);

        try {
            const btnSubmit = this.querySelector('button[type="submit"]');
            const originalHTML = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';
            btnSubmit.disabled = true;

            // Llamada POST a tu ruta Flask
            const response = await fetch(`/api/admin/update_user/${currentSelectedUserId}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (response.ok && result.success) {
                // Ocultar modal de edición
                const editModalEl = document.getElementById('adminEditUserModal');
                const modal = bootstrap.Modal.getInstance(editModalEl);
                if(modal) modal.hide();

                // Alerta personalizada Glassmorphic de éxito
                showGlassAlert(`Los datos del usuario han sido actualizados correctamente.`, '<i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>');
                
                showUsersList();
                loadAllUsers(); // Recarga la base de datos
            } else {
                alert("Error al actualizar: " + (result.error || 'Desconocido'));
            }
            
            btnSubmit.innerHTML = originalHTML;
            btnSubmit.disabled = false;
        } catch(err) {
            alert("Error de conexión al guardar los datos.");
        }
    });
});

let currentSelectedUserId = null;
let currentSelectedUserName = "";
let currentSelectedUserObj = null;

// Modal Glassmorphic para reemplazo de alertas nativas
function showGlassAlert(message, iconHTML = '<i class="bi bi-info-circle text-orange" style="font-size: 3rem;"></i>') {
    document.getElementById('actionModalIcon').innerHTML = iconHTML;
    document.getElementById('actionModalMessage').innerText = message;
    const actionModal = new bootstrap.Modal(document.getElementById('actionModal'));
    actionModal.show();
}

// LLAMADA REAL A LA BASE DE DATOS PARA CARGAR USUARIOS
async function loadAllUsers() {
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm text-orange me-2"></div>Cargando base de datos...</td></tr>';
    
    try {
        const response = await fetch('/api/admin/users');
        const data = await response.json();
        
        if (data.error) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-danger">${data.error}</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No se encontraron usuarios.</td></tr>';
            return;
        }

        data.forEach(u => {
            const statusBadge = u.status === 'Activo' ? '<span class="badge bg-success rounded-pill px-3 shadow-sm">Activo</span>' : '<span class="badge bg-danger rounded-pill px-3 shadow-sm">Bloqueado</span>';
            const roleBadge = u.role === 'Superusuario' ? '<span class="badge bg-warning text-dark rounded-pill px-3 shadow-sm"><i class="bi bi-shield-lock-fill"></i> Super</span>' : `<span class="badge bg-secondary rounded-pill px-3 shadow-sm">${u.role}</span>`;
            
            // Construcción dinámica (Inyectado seguro por JS escapando JSON)
            const safeUser = JSON.stringify(u).replace(/'/g, "&apos;");
            
            // LA MAGIA OCURRE AQUÍ: Disposición responsiva de datos. En móviles se inyecta Rol y Estado debajo del correo.
            tbody.innerHTML += `
                <tr style="cursor:pointer;" onclick='viewUserDetails(${safeUser})' class="bg-white bg-opacity-50 user-row">
                    <td class="py-3">
                        <div class="fw-bold text-dark d-flex align-items-center">
                            <i class="bi bi-person-circle text-orange me-2 fs-5"></i> 
                            <span class="text-truncate">${u.name} ${u.last_name_1} ${u.last_name_2}</span>
                        </div>
                        <div class="text-secondary small ms-4" style="word-break: break-all;">${u.email}</div>
                        <!-- Rol y Estado en versión Móvil -->
                        <div class="d-sm-none mt-2 ms-4 d-flex flex-wrap gap-2">${roleBadge} ${statusBadge}</div>
                    </td>
                    <!-- Rol y Estado versión Escritorio -->
                    <td class="py-3 d-none d-sm-table-cell">${roleBadge}</td>
                    <td class="py-3 d-none d-sm-table-cell">${statusBadge}</td>
                    <td class="text-end text-sm-center py-3">
                        <button class="btn btn-sm btn-orange rounded-circle shadow-sm" title="Ver Expediente"><i class="bi bi-eye-fill"></i></button>
                    </td>
                </tr>
            `;
        });
        
        // Disparar evento para reflejar búsqueda si el input no estaba vacío
        document.getElementById('searchUserInput').dispatchEvent(new Event('input'));
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-danger">Fallo de conexión al servidor</td></tr>';
    }
}

function viewUserDetails(userObj) {
    currentSelectedUserId = userObj.id;
    currentSelectedUserName = `${userObj.name} ${userObj.last_name_1}`;
    currentSelectedUserObj = userObj; // Guardar datos para editar
    
    document.getElementById('adminUsersList').classList.add('d-none');
    document.getElementById('adminUserDetails').classList.remove('d-none');
    
    let ageStr = 'No especificada';
    if (userObj.dob) {
        const dob = new Date(userObj.dob);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const m = today.getMonth() - dob.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) { age--; }
        ageStr = `${userObj.dob} (<span class="badge bg-secondary rounded-pill ms-1">${age} años</span>)`;
    }

    const content = document.getElementById('userDetailsContent');
    // Disposición Responsiva en col-12 col-md-6
    content.innerHTML = `
        <h3 class="fw-bold text-dark border-bottom border-secondary border-opacity-25 pb-3 mb-4 fs-4">
            <i class="bi bi-person-vcard-fill text-orange me-2"></i>Expediente #${userObj.id}
        </h3>
        <div class="row g-3 g-md-4 text-start">
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Nombre Completo</label>
                    <div class="fw-bold fs-5 ps-2 text-dark text-break">${userObj.name} ${userObj.last_name_1} ${userObj.last_name_2}</div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Correo Electrónico</label>
                    <div class="fw-semibold fs-6 ps-2 text-dark text-break">${userObj.email}</div>
                </div>
            </div>
            
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Rol y Estado</label>
                    <div class="fw-semibold fs-6 ps-2 text-dark">
                        ${userObj.role} - 
                        ${userObj.status === 'Activo' ? '<span class="text-success fw-bold"><i class="bi bi-check-circle-fill me-1"></i>Activo</span>' : '<span class="text-danger fw-bold"><i class="bi bi-x-circle-fill me-1"></i>Bloqueado</span>'}
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Teléfono</label>
                    <div class="fw-semibold fs-6 ps-2 text-dark">${userObj.phone}</div>
                </div>
            </div>
            
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Fecha de Nacimiento</label>
                    <div class="fw-semibold fs-6 ps-2 text-dark">${ageStr}</div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="info-item w-100 shadow-sm h-100">
                    <label class="text-uppercase text-secondary fw-bold mb-1" style="font-size: 0.7rem;">Fechas de Sistema</label>
                    <div class="fw-semibold text-dark" style="font-size: 0.85rem;">
                        <div class="mb-1"><i class="bi bi-calendar-check text-orange me-1"></i>Reg: ${userObj.created || 'N/A'}</div>
                        <div><i class="bi bi-clock-history text-orange me-1"></i>Mod: ${userObj.updated || 'N/A'}</div>
                    </div>
                </div>
            </div>
        </div>
    `;

    const btnBlock = document.getElementById('btnBlockUser');
    if (userObj.status === 'Activo') {
        btnBlock.innerHTML = '<i class="bi bi-slash-circle me-1"></i>Bloquear Acceso';
        btnBlock.className = 'btn btn-warning rounded-pill px-4 shadow-sm fw-bold w-100 w-sm-auto text-dark btn-action-mobile';
    } else {
        btnBlock.innerHTML = '<i class="bi bi-check-circle me-1"></i>Desbloquear';
        btnBlock.className = 'btn btn-success rounded-pill px-4 shadow-sm fw-bold w-100 w-sm-auto text-white btn-action-mobile';
    }
}

function showUsersList() {
    currentSelectedUserId = null;
    currentSelectedUserName = "";
    currentSelectedUserObj = null;
    document.getElementById('adminUserDetails').classList.add('d-none');
    document.getElementById('adminUsersList').classList.remove('d-none');
}

// Función para abrir el modal de edición y poblarlo
function openEditUserModal() {
    if(!currentSelectedUserObj) return;
    
    // Poblar los inputs básicos
    document.getElementById('editName').value = currentSelectedUserObj.name;
    document.getElementById('editLastName1').value = currentSelectedUserObj.last_name_1;
    document.getElementById('editLastName2').value = currentSelectedUserObj.last_name_2;
    document.getElementById('editEmail').value = currentSelectedUserObj.email;
    document.getElementById('editRole').value = currentSelectedUserObj.role;
    
    const avatarPath = currentSelectedUserObj.avatar && currentSelectedUserObj.avatar.startsWith('uploads') ? currentSelectedUserObj.avatar : (currentSelectedUserObj.avatar === 'default.png' ? 'default.png' : 'uploads/' + currentSelectedUserObj.avatar);
    document.getElementById('editAvatarPreviewImg').src = "/static/" + avatarPath;
    
    // Poblar teléfono si existe
    const dynSelect = document.getElementById('editDynamicSelect');
    const dynContainer = document.getElementById('editDynamicContainer');
    if (currentSelectedUserObj.phone && currentSelectedUserObj.phone !== "No registrado") {
        dynSelect.value = 'Telefono';
        dynContainer.innerHTML = `
            <div class="input-group">
                <span class="input-group-text glass-input border-end-0 text-orange"><i class="bi bi-phone"></i></span>
                <input type="text" name="phone" class="form-control glass-input py-2" placeholder="Digite el número telefónico" 
                oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="15" value="${currentSelectedUserObj.phone.replace(/[^0-9]/g, '')}">
            </div>`;
    } else {
        dynSelect.value = '';
        dynContainer.innerHTML = '';
    }

    // Mostrar el modal
    const editModal = new bootstrap.Modal(document.getElementById('adminEditUserModal'));
    editModal.show();
}

function handleEditDynamicSelect() {
    const select = document.getElementById('editDynamicSelect').value;
    const container = document.getElementById('editDynamicContainer');
    container.innerHTML = ''; 

    if (select === 'Telefono' || select === 'Whatsapp') {
        container.innerHTML = `
            <div class="input-group">
                <span class="input-group-text glass-input border-end-0 text-orange"><i class="bi bi-phone"></i></span>
                <input type="text" name="phone" class="form-control glass-input py-2" placeholder="Digite el número telefónico" 
                oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="15">
            </div>
            <small class="text-muted mt-1 d-block ps-2">Solo números permitidos.</small>`;
    } 
    else if (select === 'Facebook' || select === 'Instagram' || select === 'Direccion') {
        const fieldName = select === 'Direccion' ? 'address' : select.toLowerCase();
        container.innerHTML = `
            <div class="input-group mt-2">
                <span class="input-group-text glass-input border-end-0 text-orange"><i class="bi bi-link-45deg"></i></span>
                <input type="url" name="${fieldName}" class="form-control glass-input" placeholder="https://ejemplo.com/perfil">
            </div>`;
    }
    else if (select === 'Fecha') {
        container.innerHTML = `
            <label class="form-label small text-secondary fw-bold">Fecha Especial (Día/Mes/Año)</label>
            <input type="date" name="dob" class="form-control glass-input">`;
    }
    else if (select === 'Institucion') {
        container.innerHTML = `
            <div class="row g-2 mt-1">
                <div class="col-12"><input type="text" name="institution" class="form-control glass-input mb-2" placeholder="Nombre de la Institución/Empresa"></div>
            </div>`;
    }
    else if (select === 'Otro') {
        container.innerHTML = `<input type="text" name="other_info" class="form-control glass-input mt-2" placeholder="Descripción General" style="text-transform: capitalize;">`;
    }
}

// CONEXIÓN REAL A LA BASE DE DATOS: Bloquear o Desbloquear
async function toggleUserStatus() {
    if(!currentSelectedUserId) return;
    try {
        const response = await fetch(`/api/admin/toggle_status/${currentSelectedUserId}`, { method: 'POST' });
        const result = await response.json();
        
        if(response.ok && result.success) {
            showGlassAlert(`El estado del usuario ahora es: <b>${result.new_status}</b>`, '<i class="bi bi-arrow-repeat text-warning" style="font-size: 3rem;"></i>');
            showUsersList();
            loadAllUsers();
        } else {
            alert(result.error || "No se pudo cambiar el estado del usuario.");
        }
    } catch(err) {
        alert("Error de red al intentar comunicarse con el servidor.");
    }
}

// CONEXIÓN REAL A LA BASE DE DATOS: Borrado en 3 clics
let deleteClicks = 0;
async function confirmDeleteUser() {
    if(!currentSelectedUserId) return;
    
    const btn = document.getElementById('btnDeleteUser');
    deleteClicks++;
    if(deleteClicks === 1) {
        btn.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-1"></i>¿Seguro?';
        btn.classList.replace('btn-danger', 'btn-secondary');
    } else if (deleteClicks === 2) {
        btn.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-1"></i>Confirmar Borrado';
        btn.classList.replace('btn-secondary', 'btn-danger');
    } else {
        // Ejecución Real del borrado
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Borrando...';
        btn.disabled = true;
        try {
            const response = await fetch(`/api/admin/delete_user/${currentSelectedUserId}`, { method: 'DELETE' });
            const result = await response.json();
            if(response.ok && result.success) {
                showGlassAlert(`Usuario eliminado permanentemente de la base de datos.`, '<i class="bi bi-trash-fill text-danger" style="font-size: 3rem;"></i>');
                deleteClicks = 0;
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-trash-fill me-1"></i>Borrar Usuario';
                showUsersList();
                loadAllUsers();
            } else {
                alert(result.error || "No se pudo eliminar el usuario.");
                btn.disabled = false;
                deleteClicks = 0;
                btn.innerHTML = '<i class="bi bi-trash-fill me-1"></i>Borrar Usuario';
                btn.classList.replace('btn-secondary', 'btn-danger');
            }
        } catch(err) {
            alert("Error al intentar conectarse para eliminar el usuario.");
            btn.disabled = false;
        }
    }
    
    setTimeout(() => { 
        if(deleteClicks > 0 && deleteClicks < 3) {
            deleteClicks = 0;
            btn.innerHTML = '<i class="bi bi-trash-fill me-1"></i>Borrar Usuario';
            btn.className = 'btn btn-danger rounded-pill px-4 shadow-sm fw-bold w-100 w-sm-auto btn-action-mobile';
            btn.disabled = false;
        }
    }, 3000);
}
</script>
